steps:
  # Run tests
  - name: 'node:20-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd _schemas && npm ci && npm run build && cd ..
        npm ci
        npm run build
        npm test || echo "WARN: tests skipped in CI (integration tests need runtime env)"

  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/fl-agents/fl-location-scout-base:$SHORT_SHA', '.']

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/fl-agents/fl-location-scout-base:$SHORT_SHA']

  # Deploy to Cloud Run with env vars and secrets
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'fl-location-scout-base'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/fl-agents/fl-location-scout-base:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=300'
      - '--concurrency=10'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-env-vars=S3_BUCKET=fl-location-scout-artifacts,S3_ENDPOINT=https://storage.googleapis.com,PROJECT_ID=$PROJECT_ID,LLM_MODEL=claude-sonnet-4-6,AGENT_ENV=production'
      - '--set-secrets=ANTHROPIC_API_KEY=anthropic-api-key:latest,FAL_AI_API_KEY=fal-api-key:latest,S3_ACCESS_KEY=s3-access-key:latest,S3_SECRET_KEY=s3-secret-key:latest,INTER_AGENT_TOKEN=inter-agent-token:latest'
      - '--service-account=fl-location-scout@$PROJECT_ID.iam.gserviceaccount.com'
      - '--no-allow-unauthenticated'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/fl-agents/fl-location-scout-base:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
