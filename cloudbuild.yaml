steps:
  # Run tests
  - name: 'node:20-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd _schemas && npm ci && npm run build && cd ..
        npm ci
        npm run build
        npm test || echo "WARN: tests skipped in CI (integration tests need runtime env)"

  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/fl-agents/fl-location-scout-base:$SHORT_SHA', '.']

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/fl-agents/fl-location-scout-base:$SHORT_SHA']

  # Deploy to Cloud Run with env vars and secrets
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'fl-location-scout-base'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/fl-agents/fl-location-scout-base:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=300'
      - '--concurrency=10'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-env-vars=GCS_BUCKET=${_GCS_BUCKET},PROJECT_ID=$PROJECT_ID,LLM_MODEL=claude-sonnet-4-6,AGENT_ENV=production'
      - '--set-secrets=ANTHROPIC_API_KEY=anthropic-api-key:latest,GEMINI_API_KEY=gemini-api-key:latest'
      - '--service-account=fl-location-scout@$PROJECT_ID.iam.gserviceaccount.com'
      - '--no-allow-unauthenticated'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/fl-agents/fl-location-scout-base:$SHORT_SHA'

substitutions:
  _GCS_BUCKET: 'fl-artifacts-${PROJECT_ID}'

options:
  logging: CLOUD_LOGGING_ONLY
