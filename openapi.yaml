openapi: "3.0.3"
info:
  title: "LocationScout-Base API"
  version: "0.1.0"
  description: "Location Scout Agent — Film Language / Stanislavsky AI Platform. Location research agent. Finds and evaluates filming locations based on scene requirements and production design briefs."
  contact:
    name: Film Language Team
servers:
  - url: "https://fl-location-scout-base-xxxxx.run.app"
    description: Production (Cloud Run)
  - url: "http://localhost:8080"
    description: Local development
paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags: [system]
      responses:
        "200":
          description: Agent is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  version: { type: string, example: "0.1.0" }
                  uptime: { type: number, example: 3600.5 }
  /info:
    get:
      summary: Agent metadata
      operationId: getInfo
      tags: [system]
      responses:
        "200":
          description: Agent information
          content:
            application/json:
              schema:
                type: object
                properties:
                  name: { type: string, example: "LocationScout-Base" }
                  role: { type: string, example: "Location Scout" }
                  version: { type: string, example: "0.1.0" }
  /process:
    post:
      summary: Submit task for processing
      operationId: processTask
      tags: [processing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FLACPMessage"
      responses:
        "202":
          description: Task accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id: { type: string, format: uuid }
                  status: { type: string, example: "accepted" }
  /process/{task_id}/status:
    get:
      summary: Check task status
      operationId: getTaskStatus
      tags: [processing]
      parameters:
        - name: task_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Task status
  /process/{task_id}/result:
    get:
      summary: Get task result
      operationId: getTaskResult
      tags: [processing]
      parameters:
        - name: task_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Task result
  /feedback:
    post:
      summary: Receive feedback from other agents
      operationId: receiveFeedback
      tags: [communication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FLACPMessage"
      responses:
        "200":
          description: Feedback received
  /schema:
    get:
      summary: Input/output JSON schema
      operationId: getSchema
      tags: [system]
      responses:
        "200":
          description: Agent data schema

components:
  schemas:
    FLACPMessage:
      type: object
      required: [protocol, from, to, task_id, action, payload]
      properties:
        protocol: { type: string, example: "flacp/1.0" }
        from: { type: string, example: "1ad-base" }
        to: { type: string, example: "location-scout" }
        task_id: { type: string, format: uuid }
        action: { type: string, enum: [process, feedback, status] }
        payload: { type: object }
        metadata:
          type: object
          properties:
            project_id: { type: string, format: uuid }
            timestamp: { type: string, format: date-time }
            priority: { type: string, enum: [low, normal, high, critical] }
